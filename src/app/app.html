<!-- through routing -->

 @if(isLoggedIn){
<h1 style="text-align:center">Home page</h1>
<div style="display:flex; justify-content:space-evenly">
<a routerLink="trainingDetailsForm">Training Details Form</a>
@if(role==='manager'){
<a routerLink="trainingData"  >Upcoming Trainings</a>
}
</div>
<router-outlet></router-outlet>
 }
 @else{ <h1 style="text-align: center;"> Register to our Portal</h1>

 <form  (ngSubmit)="submit()" #form="ngForm">
  <strong>Username: </strong><input type="text" name='username'required  [(ngModel)]="username"><br>
  <strong>Password: </strong><input type="password" name="password" required [(ngModel)]="password"><br>
  

  <strong>Role: </strong>
  <select name="role"[(ngModel)]='role'required>
    <option >user</option>
    <option>manager</option>
  </select><br>
  <button type="submit" [disabled]="form.invalid" >register</button>

 </form>
 }
